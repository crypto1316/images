<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Images</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <style>
    body {
      background: linear-gradient(to right, #f8f9fa, #e9ecef);
      font-family: 'Segoe UI', sans-serif;
    }

    h2 {
      text-align: center;
      margin: 30px 0;
      font-weight: 600;
      color: #333;
    }

    .box {
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      border: 1px solid #eee;
      transition: 0.3s;
    }

    .box:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
    }

    .box img {
      transition: 0.4s;
    }

    .box:hover img {
      transform: scale(1.05);
    }

    .label {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Bootstrap Image Styles</h2>

  <div class="row text-center">

    <div class="col-md-3 mb-4">
      <div class="box">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="img-fluid">
        <div class="label">Responsive</div>
      </div>
    </div>

    <div class="col-md-3 mb-4">
      <div class="box">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="rounded img-fluid">
        <div class="label">Rounded</div>
      </div>
    </div>

    <div class="col-md-3 mb-4">
      <div class="box">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="rounded-circle img-fluid">
        <div class="label">Circle</div>
      </div>
    </div>

    <div class="col-md-3 mb-4">
      <div class="box">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="img-thumbnail">
        <div class="label">Thumbnail</div>
      </div>
    </div>

  </div>

  <hr>

  <h5 class="text-center mt-4">Alignment</h5>

  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="float-left" width="150">
  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="float-right" width="150">

  <div class="clearfix"></div>

  <h5 class="text-center mt-4">Centered</h5>

  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="mx-auto d-block img-fluid" width="250">

</div>

</body>
</html>
